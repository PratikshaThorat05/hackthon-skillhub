<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>SkillsHub — AI Talent Intelligence</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="AI-powered talent intelligence platform">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f1f5f9;
      color: #0f172a;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      line-height: 1.5;
    }

    /* Skip to main content — accessibility */
    .skip-link {
      position: absolute;
      top: -100%;
      left: 1rem;
      background: #4f46e5;
      color: white;
      padding: .5rem 1rem;
      border-radius: 0 0 8px 8px;
      font-weight: 600;
      font-size: .875rem;
      z-index: 9999;
      text-decoration: none;
      transition: top .15s;
    }
    .skip-link:focus { top: 0; }

    /* App layout */
    .app-shell { display: flex; min-height: 100vh; }
    .main-content { flex: 1; min-width: 0; overflow-y: auto; min-height: 100vh; }

    /* Global focus visible ring — WCAG 2.1 AA */
    :focus-visible {
      outline: 2px solid #4f46e5;
      outline-offset: 2px;
    }

    /* Remove default focus ring only when using mouse */
    :focus:not(:focus-visible) { outline: none; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    /* Global transition */
    a, button { transition: color .15s, background .15s, border-color .15s, box-shadow .15s, transform .1s; }

    /* Visually hidden (screen reader only) */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <app-root></app-root>
</body>
</html>
